# GoReleaser: builds the gamekit author CLI on every vX.Y.Z tag (pushed by
# the changesets release flow). Changelogs are owned by changesets
# (CHANGELOG.md), so GoReleaser's own changelog is disabled.
version: 2
project_name: gamekit

builds:
  - id: gamekit
    main: ./cmd/gamekit
    binary: gamekit
    env: [CGO_ENABLED=0]
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ldflags: ["-s -w -X main.version={{ .Version }}"]

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  disable: true

release:
  draft: false
  footer: |
    ---
    Author docs: [GUIDE.md](https://github.com/shellcade/gamekit/blob/main/GUIDE.md) · ABI contract: [ABI.md](https://github.com/shellcade/gamekit/blob/main/ABI.md)
